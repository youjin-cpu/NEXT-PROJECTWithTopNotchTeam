<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dunamu Branding Tracker</title>
<link rel="stylesheet" href="dunamu_tracker.css">
</head>
<body>

<div id="loading-overlay" class="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">데이터 불러오는 중...</div>
</div>
<div class="save-indicator hidden" id="save-indicator"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h10l4 4v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="14 2 14 8 8 8"/><circle cx="12" cy="15" r="2"/></svg><span id="save-text">저장 중...</span></div>

<div id="login-screen" class="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">Dunamu Branding</div>
    <div class="login-title">업무 트래커</div>
    <div class="login-sub">팀원을 선택하거나 새로 등록하세요</div>
    <div class="member-list" id="login-member-list"></div>
    <div class="login-divider">또는 새 팀원으로 시작</div>
    <div class="new-member-row">
      <input class="form-input" id="login-new-name" placeholder="이름" style="flex:1">
      <input class="form-input" id="login-new-role" placeholder="역할" style="flex:1">
      <button class="btn btn-primary btn-sm" onclick="registerAndLogin()" style="white-space:nowrap"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 등록</button>
    </div>
  </div>
</div>

<div class="app" id="app">
<div class="wrap">
<div class="nav">
  <div class="nav-left">
    <div class="nav-brand">Dunamu Branding</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('tracker',this)">트래커</button>
      <button class="nav-tab" onclick="showPage('workload',this)">담당자 현황</button>
      <button class="nav-tab" onclick="showPage('history',this)">변경 히스토리</button>
      <button class="nav-tab" onclick="showPage('members',this)">팀원 관리</button>
    </div>
  </div>
  <div class="nav-right">
    <div class="cur-user"><span id="cur-av" class="avatar" style="width:28px;height:28px;font-size:11px"></span><span id="cur-name" style="font-size:13px;font-weight:500"></span></div>
    <button class="btn btn-ghost btn-sm" onclick="logout()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
  </div>
</div>
<div class="page active" id="page-tracker">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px">
    <span id="top-sub-count" style="font-size:13px;color:var(--text2)"></span>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="toggleMaster()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> 마스터</button>
      <button class="btn btn-primary" id="btn-add-main" onclick="openAddPopover()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 항목 추가</button>
    </div>
  </div>
  <div class="master-panel" id="master-panel" style="display:none">
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between"><span>상태(뱃지) 마스터 관리</span><button class="btn btn-sm btn-ghost" onclick="toggleMaster()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="badge-list" id="badge-master-list"></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input class="form-input" id="new-badge-name" placeholder="새 상태명" style="width:110px">
      <input type="color" id="new-badge-bg" value="#ECFDF5" style="width:32px;height:32px;padding:2px;border:.5px solid var(--border2);border-radius:var(--r-sm);cursor:pointer">
      <input type="color" id="new-badge-ft" value="#065F46" style="width:32px;height:32px;padding:2px;border:.5px solid var(--border2);border-radius:var(--r-sm);cursor:pointer">
      <button class="btn btn-primary btn-sm" onclick="addBadge()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 추가</button>
    </div>
  </div>
  <div class="dash">
    <div class="dash-card c-blue"><div class="dash-label">전체 완성율</div><div class="dash-num" id="d-total-pct">0%</div><div class="dash-sub" id="d-total-sub">0 / 0 완료</div><div class="progress-bar"><div class="progress-fill" id="d-total-bar" style="width:0%;background:var(--b-md)"></div></div></div>
    <div class="dash-card c-green"><div class="dash-label">이번 주차</div><div class="dash-num" id="d-week-pct">—</div><div class="dash-sub" id="d-week-sub">주차 선택 시 표시</div><div class="progress-bar"><div class="progress-fill" id="d-week-bar" style="width:0%;background:#059669"></div></div></div>
    <div class="dash-card c-amber"><div class="dash-label">마일스톤</div><div class="dash-num" id="d-ms-pct">0%</div><div class="dash-sub" id="d-ms-sub">0 / 0 완료</div><div class="progress-bar"><div class="progress-fill" id="d-ms-bar" style="width:0%;background:#D97706"></div></div></div>
  </div>
  <div class="toggle-section">
    <div class="toggle-header" onclick="toggleSection('track')"><div class="toggle-header-left"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text3)"><rect x="3" y="12" width="4" height="8"/><rect x="10" y="8" width="4" height="12"/><rect x="17" y="4" width="4" height="16"/></svg><span class="toggle-label">트랙별 완성율</span></div><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="toggle-icon open" id="toggle-icon-track"><polyline points="6 9 12 15 18 9"/></svg></div>
    <div class="toggle-body open" id="toggle-body-track"><div class="track-bars" id="track-bars"></div></div>
  </div>
  <div class="toggle-section">
    <div class="toggle-header" onclick="toggleSection('week')"><div class="toggle-header-left"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text3)"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="toggle-label">주차별 완성율</span></div><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="toggle-icon open" id="toggle-icon-week"><polyline points="6 9 12 15 18 9"/></svg></div>
    <div class="toggle-body open" id="toggle-body-week"><div class="week-mini" id="week-mini"></div></div>
  </div>
  <div class="week-filter"><span class="wf-lbl">주차 필터</span><button class="wf-btn active" onclick="filterWeek('all',this)">전체</button><div id="week-filter-btns" style="display:flex;gap:6px;flex-wrap:wrap"></div></div>
  <div class="tbl-wrap">
    <table>
      <colgroup><col class="c-chk"><col class="c-week"><col class="c-date"><col class="c-main"><col class="c-track"><col class="c-task"><col class="c-asgn"><col class="c-edit"></colgroup>
      <thead><tr><th></th><th>주간</th><th>기간</th><th>주간 메인 업무</th><th>트랙</th><th>업무 내용</th><th>담당자</th><th>편집</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<div class="page" id="page-workload"><div class="page-header"><div class="page-title">담당자별 업무 현황</div></div><div class="workload-grid" id="workload-grid"></div></div>
<div class="page" id="page-workload-detail"><div class="detail-back" onclick="showWorkloadList()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> 담당자 현황으로</div><div class="detail-header" id="detail-header"></div><div id="detail-body"></div></div>
<div class="page" id="page-history"><div class="page-header"><div class="page-title">변경 히스토리</div><button class="btn btn-sm" onclick="clearHistory()" style="color:var(--text2)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg> 전체 삭제</button></div><div id="history-list"></div></div>
<div class="page" id="page-members">
  <div class="page-header"><div class="page-title">등록된 팀원</div></div>
  <div class="member-grid" id="member-grid"></div>
  <div class="divider"></div>
  <div style="margin-bottom:1rem;font-size:14px;font-weight:600">새 팀원 추가</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <input class="form-input" id="new-m-name" placeholder="이름" style="width:140px">
    <input class="form-input" id="new-m-role" placeholder="역할" style="width:180px">
    <button class="btn btn-primary" onclick="addMember()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 추가</button>
  </div>
</div>
</div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="closePopover()"></div>
<div class="popover" id="popover" style="display:none">
  <div class="pop-title"><span id="pop-title">항목 추가</span><button class="btn btn-sm btn-ghost" onclick="closePopover()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
  <input type="hidden" id="edit-id">
  <div class="form-row"><label class="form-lbl">주간 *</label><select class="form-input" id="f-week" onchange="onWeekChange()"></select></div>
  <div class="form-row" id="new-week-row" style="display:none">
    <label class="form-lbl">새 주차 이름 *</label><input class="form-input" id="f-new-name" placeholder="W17">
    <label class="form-lbl" style="margin-top:8px">기간 *</label><input class="form-input" id="f-new-dates" placeholder="9/22–9/26" style="margin-top:4px">
  </div>
  <div class="form-row"><label class="form-lbl">기간 (자동입력)</label><input class="form-input" id="f-dates" disabled></div>
  <div class="form-row"><label class="form-lbl">주간 메인 업무 <span id="main-hint" style="font-size:11px;font-weight:400;color:var(--text3)"></span></label><input class="form-input" id="f-main" placeholder="주간 메인 업무명"></div>
  <div class="form-row"><label class="form-lbl">트랙 *</label>
    <select class="form-input" id="f-track">
      <option value="common">공통</option><option value="core">브랜드 코어 & 보이스</option>
      <option value="identity">브랜드 아이덴티티</option><option value="asset">브랜드 에셋</option>
      <option value="site">브랜드 에셋 사이트</option><option value="film">브랜드 Film</option>
      <option value="collab">공동브랜딩</option>
    </select>
  </div>
  <div class="form-row"><label class="form-lbl">업무 내용 *</label><input class="form-input" id="f-task" placeholder="업무 내용을 입력하세요"></div>
  <div class="form-row"><label class="form-lbl">담당자 (복수 선택 가능)</label><div class="assignee-checks" id="assignee-checks"></div></div>
  <div class="pop-footer">
    <button class="btn btn-danger btn-sm" id="btn-delete" style="display:none;margin-right:auto" onclick="confirmDelete(event)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M9 6V4h6v2"/></svg> 삭제</button>
    <button class="btn btn-sm" onclick="closePopover()">취소</button>
    <button class="btn btn-primary btn-sm" onclick="saveTask()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 저장</button>
  </div>
</div>
<div class="del-overlay" id="del-overlay" style="display:none" onclick="closeDelPop()"></div>
<div class="del-pop" id="del-pop" style="display:none">
  <div class="del-pop-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
  <div class="del-pop-title">삭제 확인</div>
  <div class="del-pop-msg" id="del-pop-msg"></div>
  <div class="del-pop-footer"><button class="btn btn-sm" onclick="closeDelPop()">취소</button><button class="btn btn-danger btn-sm" onclick="executeDelete()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M9 6V4h6v2"/></svg> 삭제</button></div>
</div>

<script src="dunamu_tracker.js"></script>
</body>
</html>
